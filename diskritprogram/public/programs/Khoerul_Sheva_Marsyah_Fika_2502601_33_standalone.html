<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Program Transpose Matriks</title>
<style>
    body{
        font-family: 'Times New Roman', Times, serif, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        margin: 0;
        padding: 30px;
    }

    .container{
        max-width: 800px;
        margin: auto;
        background: #efcad1;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    h1{
        text-align: center;
        color: #1565c0;
    }

    p{
        font-weight: bold;
        color: #333;
    }

    textarea{
        width: 100%;
        height: 140px;
        border: 2px solid #2196f3;
        border-radius: 10px;
        padding: 10px;
        font-size: 15px;
        resize: none;
    }

    button{
        margin-top: 15px;
        background: #2196f3;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
    }

    button:hover{
        background: #1565c0;
    }

    .hasil{
        margin-top: 25px;
        padding: 15px;
        border-radius: 10px;
        background: #f5f5f5;
    }

    table{
        border-collapse: collapse;
        margin-top: 10px;
        margin-bottom: 20px;
    }

    td{
        border: 1px solid #555;
        padding: 10px 15px;
        text-align: center;
        min-width: 40px;
    }

    .awal td{
        background: #fff3cd;
    }

    .transpose td{
        background: #d4edda;
    }

    h3{
        color: #0d47a1;
    }
</style>
<style>.author-badge{position:fixed;top:16px;left:16px;z-index:9999;padding:6px 12px;border-radius:999px;font-size:12px;background:#111;color:#fff}</style></head>
<body><div class="author-badge">Khoerul Sheva Marsyah Fika_2502601</div>
<div class="container">
<h1>Program Transpose Matriks</h1>
<p>Masukkan matriks (pisahkan angka dengan spasi, baris dengan Enter)</p>
<textarea id="inputMatrix">1 2
3 4</textarea>
<br/>
<button onclick="hitungTranspose()">
        Hitung Transpose
    </button>
<div class="hasil" id="output"></div>
</div>
<script>

function transpose(matriks){

    let hasil = [];

    for(let i = 0; i < matriks[0].length; i++){

        let baris = [];

        for(let j = 0; j < matriks.length; j++){
            baris.push(matriks[j][i]);
        }

        hasil.push(baris);
    }

    return hasil;
}

function buatTabel(data, kelas){

    let html = `<table class="${kelas}">`;

    data.forEach(baris => {

        html += "<tr>";

        baris.forEach(angka => {
            html += `<td>${angka}</td>`;
        });

        html += "</tr>";
    });

    html += "</table>";

    return html;
}

function hitungTranspose(){

    let input = document.getElementById("inputMatrix").value.trim();

    let matriks = input
        .split("\n")
        .map(baris =>
            baris.trim()
                  .split(/\s+/)
                  .map(Number)
        );

    let hasil = transpose(matriks);

    document.getElementById("output").innerHTML = `
        <h3>📌 Matriks Awal</h3>
        ${buatTabel(matriks,"awal")}

        <h3>🔄 Hasil Transpose</h3>
        ${buatTabel(hasil,"transpose")}
    `;
}

hitungTranspose();

</script>
</body>
</html>
