        #weatherWidget .city {

<script>
        // ==================== JAM REALTIME ====================
        function tampilkanJamRealtime() {
            const jamElement = document.getElementById("jamRealtime");
            if (jamElement) {
                jamElement.innerHTML = `
                    <div class="character">
                        <lottie-player src="https://assets10.lottiefiles.com/packages/lf20_puciaact.json" 
                            background="transparent" 
                            speed="1" 
                            style="width: 100%; height: 100%;" 
                            loop 
                            autoplay>
                        </lottie-player>
                    </div>
                    <div class="clock-container">
                        <div class="clock-time">
                            <span class="jam-digit">--</span>:<span class="jam-digit">--</span>:<span class="jam-digit">--</span>
                        </div>
                        <div class="clock-zone">MEMUAT...</div>
                    </div>
                `;
            }

            function updateJam() {
                const sekarang = new Date();
                const jam = sekarang.getHours().toString().padStart(2, '0');
                const menit = sekarang.getMinutes().toString().padStart(2, '0');
                const detik = sekarang.getSeconds().toString().padStart(2, '0');
                const waktuDigital = `<span class="jam-digit">${jam}</span>:<span class="jam-digit">${menit}</span>:<span class="jam-digit">${detik}</span>`;

                const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                let zona = timezone;
                if (timezone === "Asia/Jakarta") zona = "ًں‡®ًں‡© WIB";
                else if (timezone === "Asia/Makassar") zona = "ًں‡®ًں‡© WITA";
                else if (timezone === "Asia/Jayapura") zona = "ًں‡®ًں‡© WIT";
                else zona = `ًں•گ ${timezone.split('/').pop() || "UTC"}`;

                const jamContainer = document.getElementById("jamRealtime");
                if (jamContainer) {
                    const timeElement = jamContainer.querySelector('.clock-time');
                    const zoneElement = jamContainer.querySelector('.clock-zone');
                    if (timeElement) timeElement.innerHTML = waktuDigital;
                    if (zoneElement) zoneElement.innerHTML = zona;
                }
            }

            updateJam();
            setInterval(updateJam, 1000);
        }
        tampilkanJamRealtime();

        // ==================== MATRIKS ====================
        function buatMatriks() {
            const rows = parseInt(document.getElementById("rows").value);
            const cols = parseInt(document.getElementById("cols").value);
            
            const manualRow = document.getElementById("manualRow");
            const manualCol = document.getElementById("manualCol");
            manualRow.innerHTML = '';
            manualCol.innerHTML = '';
            for (let i = 0; i < rows; i++) {
                manualRow.innerHTML += `<option value="${i}">${i+1}</option>`;
                manualCol.innerHTML += `<option value="${i}">${i+1}</option>`;
            }

            let html = '<div class="matrix">';
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    html += `<input type="number" id="m_${i}_${j}" value="0">`;
                }
                html += "<br>";
            }
            html += "</div>";
            document.getElementById("matrixContainer").innerHTML = html;
            document.getElementById("hasil").innerHTML = "";
        }

        function isiRandom() {
            const rows = parseInt(document.getElementById("rows").value);
            const cols = parseInt(document.getElementById("cols").value);
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const angkaRandom = Math.floor(Math.random() * 20) + 1;
                    const input = document.getElementById(`m_${i}_${j}`);
                    if (input) input.value = angkaRandom;
                }
            }
        }

        // ==================== FUNGSI DETERMINAN DENGAN DETAIL ====================
        // Fungsi untuk menghitung determinan matriks 2x2 dengan detail
        function detailDeterminan2x2(mat, prefix = "") {
            const a = mat[0][0], b = mat[0][1], c = mat[1][0], d = mat[1][1];
            const hasil = (a * d) - (b * c);
            return {
                hasil: hasil,
                teks: `${prefix}(${a} أ— ${d}) âˆ’ (${b} أ— ${c}) = ${a*d} âˆ’ ${b*c} = ${hasil}`
            };
        }

        // Fungsi untuk menghitung determinan matriks 3x3 dengan ekspansi kofaktor (detail)
        function detailDeterminan3x3(mat, prefix = "") {
            const a = mat[0][0], b = mat[0][1], c = mat[0][2];
            const d = mat[1][0], e = mat[1][1], f = mat[1][2];
            const g = mat[2][0], h = mat[2][1], i = mat[2][2];
            
            // Minor M11
            const minor11 = [[e, f], [h, i]];
            const det11 = (e * i) - (f * h);
            // Minor M12
            const minor12 = [[d, f], [g, i]];
            const det12 = (d * i) - (f * g);
            // Minor M13
            const minor13 = [[d, e], [g, h]];
            const det13 = (d * h) - (e * g);
            
            const hasil = (a * det11) - (b * det12) + (c * det13);
            
            let teks = `${prefix}det = ${a} أ— (${e}أ—${i} âˆ’ ${f}أ—${h}) âˆ’ ${b} أ— (${d}أ—${i} âˆ’ ${f}أ—${g}) + ${c} أ— (${d}أ—${h} âˆ’ ${e}أ—${g})\n`;
            teks += `${prefix}= ${a} أ— (${e*i} âˆ’ ${f*h}) âˆ’ ${b} أ— (${d*i} âˆ’ ${f*g}) + ${c} أ— (${d*h} âˆ’ ${e*g})\n`;
            teks += `${prefix}= ${a} أ— ${det11} âˆ’ ${b} أ— ${det12} + ${c} أ— ${det13}\n`;
            teks += `${prefix}= ${a*det11} âˆ’ ${b*det12} + ${c*det13} = ${hasil}`;
            
            return { hasil: hasil, teks: teks };
        }

        // Fungsi determinan umum dengan rekursif dan detail untuk ukuran > 3x3
        function hitungDeterminanDetail(mat, level = 0) {
            const n = mat.length;
            const indent = "  ".repeat(level);
            
            if (n === 1) return { hasil: mat[0][0], teks: `${indent}= ${mat[0][0]}` };
            if (n === 2) {
                const a = mat[0][0], b = mat[0][1], c = mat[1][0], d = mat[1][1];
                const hasil = (a * d) - (b * c);
                return { hasil: hasil, teks: `${indent}(${a} أ— ${d}) âˆ’ (${b} أ— ${c}) = ${a*d} âˆ’ ${b*c} = ${hasil}` };
            }
            
            // Untuk n >= 3, ekspansi kofaktor baris pertama
            let det = 0;
            let teks = `${indent}det = `;
            let steps = [];
            
            for (let col = 0; col < n; col++) {
                // Buat submatriks minor
                let subMat = [];
                for (let i = 1; i < n; i++) {
                    let row = [];
                    for (let j = 0; j < n; j++) {
                        if (j !== col) row.push(mat[i][j]);
                    }
                    subMat.push(row);
                }
                const subDet = hitungDeterminanDetail(subMat, level + 1);
                const sign = (col % 2 === 0) ? 1 : -1;
                const term = sign * mat[0][col] * subDet.hasil;
                det += term;
                
                let signStr = (col === 0) ? "" : (sign === 1 ? " + " : " âˆ’ ");
                if (col === 0) signStr = "";
                else signStr = (sign === 1) ? " + " : " âˆ’ ";
                
                steps.push(`${signStr}${Math.abs(mat[0][col])} أ— (${subDet.hasil})`);
            }
            
            teks += steps.join("");
            teks += `\n${indent}= ${det}`;
            
            return { hasil: det, teks: teks };
        }

        // Fungsi untuk menghitung determinan tanpa detail (untuk keperluan internal)
        function hitungDeterminan(mat) {
            const n = mat.length;
            if (n === 1) return mat[0][0];
            if (n === 2) return (mat[0][0] * mat[1][1]) - (mat[0][1] * mat[1][0]);
            
            let det = 0;
            for (let col = 0; col < n; col++) {
                let subMat = [];
                for (let i = 1; i < n; i++) {
                    let row = [];
                    for (let j = 0; j < n; j++) {
                        if (j !== col) row.push(mat[i][j]);
                    }
                    subMat.push(row);
                }
                det += Math.pow(-1, col) * mat[0][col] * hitungDeterminan(subMat);
            }
            return det;
        }

        // ==================== MEMBUAT MATRIKS MINOR ====================
        function getMinorMatrix(matrix, barisHapus, kolomHapus) {
            let minor = [];
            for (let i = 0; i < matrix.length; i++) {
                if (i === barisHapus) continue;
                let row = [];
                for (let j = 0; j < matrix.length; j++) {
                    if (j === kolomHapus) continue;
                    row.push(matrix[i][j]);
                }
                minor.push(row);
            }
            return minor;
        }

        // ==================== MENAMPILKAN MATRIKS ====================
        function tampilkanMatriks(mat) {
            if (!mat || mat.length === 0) return "[]";
            let result = "    ";
            for (let i = 0; i < mat.length; i++) {
                if (i > 0) result += "  ";
                for (let j = 0; j < mat[i].length; j++) {
                    result += mat[i][j];
                    if (j < mat[i].length - 1) result += " ";
                }
                if (i < mat.length - 1) result += "<br>  ";
            }
            result += "   ";
            return result;
        }

        // ==================== HITUNG MINOR MANUAL ====================
        function hitungMinorManual() {
            const rows = parseInt(document.getElementById("rows").value);
            const cols = parseInt(document.getElementById("cols").value);

            if (rows !== cols) {
                alert("Minor hanya untuk matriks persegi!");
                return;
            }

            let matrix = [];
            for (let i = 0; i < rows; i++) {
                matrix[i] = [];
                for (let j = 0; j < cols; j++) {
                    const el = document.getElementById(`m_${i}_${j}`);
                    if (!el) {
                        alert("Matriks belum dibuat!");
                        return;
                    }
                    matrix[i][j] = parseFloat(el.value) || 0;
                }
            }

            const barisHapus = parseInt(document.getElementById("manualRow").value);
            const kolomHapus = parseInt(document.getElementById("manualCol").value);
            
            const minorMat = getMinorMatrix(matrix, barisHapus, kolomHapus);
            const ukuranMinor = minorMat.length;
            
            let detail;
            if (ukuranMinor === 2) {
                detail = detailDeterminan2x2(minorMat, "");
            } else if (ukuranMinor === 3) {
                detail = detailDeterminan3x3(minorMat, "");
            } else {
                detail = hitungDeterminanDetail(minorMat, "");
            }
            
            let hasilManual = `<div class="card manual-card" style="display:block;text-align:left;max-width:700px">
                                <h3>ًںژ¯ Minor Manual M${barisHapus+1}${kolomHapus+1}</h3>
                                <p><b>M${barisHapus+1}${kolomHapus+1}</b> = hapus baris ${barisHapus+1} kolom ${kolomHapus+1} â†’</p>
                                <div class="minor-matrix">${tampilkanMatriks(minorMat)}</div>`;
            
            if (ukuranMinor === 1) {
                hasilManual += `<p>â†’ = <b>${minorMat[0][0]}</b></p>`;
            } else {
                hasilManual += `<p>â†’ ${detail.teks.replace(/\n/g, '<br>')}</p>`;
            }
            
            hasilManual += `</div>`;
            
            const hasilAuto = document.getElementById("hasil").innerHTML;
            document.getElementById("hasil").innerHTML = hasilManual + hasilAuto;
        }

        // ==================== HITUNG MINOR AUTO (DIAGONAL) ====================
        function hitungMinor() {
            const rows = parseInt(document.getElementById("rows").value);
            const cols = parseInt(document.getElementById("cols").value);

            if (rows !== cols) {
                document.getElementById("hasil").innerHTML = "<div class='card'><h3>â‌Œ Minor hanya untuk matriks persegi!</h3></div>";
                return;
            }

            let matrix = [];
            for (let i = 0; i < rows; i++) {
                matrix[i] = [];
                for (let j = 0; j < cols; j++) {
                    const el = document.getElementById(`m_${i}_${j}`);
                    if (!el) {
                        document.getElementById("hasil").innerHTML = "<div class='card'><h3>â‌Œ Matriks belum dibuat!</h3></div>";
                        return;
                    }
                    matrix[i][j] = parseFloat(el.value) || 0;
                }
            }

            let hasilHTML = `<div class="card" style="display:block;text-align:left;max-width:700px">
                            <h3>ًں“گ Minor Matriks (Auto - Diagonal)</h3>`;

            const maxTampil = Math.min(rows, 5);
        
            for (let idx = 0; idx < maxTampil; idx++) {
                const i = idx;
                const j = idx;
                
                const minorMat = getMinorMatrix(matrix, i, j);
                const ukuranMinor = minorMat.length;
                
                let detail;
                if (ukuranMinor === 2) {
                    detail = detailDeterminan2x2(minorMat, "");
                } else if (ukuranMinor === 3) {
                    detail = detailDeterminan3x3(minorMat, "");
                } else {
                    detail = hitungDeterminanDetail(minorMat, "");
                }
                
                hasilHTML += `<div class="minor-step">
                              <p><b>M${i+1}${j+1}</b> = hapus baris ${i+1} kolom ${j+1} â†’</p>
                              <div class="minor-matrix">${tampilkanMatriks(minorMat)}</div>`;
                
                if (ukuranMinor === 1) {
                    hasilHTML += `<p>â†’ = <b>${minorMat[0][0]}</b></p>`;
                } else {
                    hasilHTML += `<p>â†’ ${detail.teks.replace(/\n/g, '<br>')}</p>`;
                }
                hasilHTML += `</div>`;
            }
            
            hasilHTML += `</div>`;
            
            const hasilManual = document.getElementById("hasil").innerHTML;
            if (hasilManual && hasilManual.includes("Minor Manual")) {
                document.getElementById("hasil").innerHTML = hasilManual + hasilHTML;
            } else {
                document.getElementById("hasil").innerHTML = hasilHTML;
            }
        }

        // ==================== DARK MODE ====================
        const tombolTema = document.getElementById("toggleTheme");
        tombolTema.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            if (document.body.classList.contains("dark-mode")) {
                tombolTema.innerHTML = "âک€ï¸ڈ Light Mode";
            } else {
                tombolTema.innerHTML = "ًںŒ™ Dark Mode";
            }
        });

        // ==================== BACKGROUND MATEMATIKA ====================
        function buatBackgroundMatematika() {
            const simbol = ["âˆ‘", "âˆ«", "د€", "âˆڑ", "âˆ‍", "خ”", "âˆ‡", "Aلµ€", "Aâپ»آ¹", "det(A)", "rank(A)", "Ax=b", "خ»â‚پ", "خ»â‚‚", "خ»â‚ƒ", "خ¼", "دƒ", "xآ²+yآ²=zآ²", "sin(x)", "cos(x)", "tan(x)", "خ£xلµ¢", "lim xâ†’âˆ‍", "|A|", "[aلµ¢â±¼]"];
            const warna = ["#60A5FA", "#38BDF8", "#22D3EE", "#2DD4BF", "#4ADE80", "#A3E635", "#FACC15", "#FB923C", "#F472B6", "#C084FC", "#818CF8", "#F9A8D4"];
            const bg = document.getElementById("mathBackground");

                bg.appendChild(span);

        }
        buatBackgroundMatematika();

        // ==================== CUACA ====================
        async function tampilkanCuaca() {
            if (!navigator.geolocation) {
                document.getElementById("weatherWidget").innerHTML = "ًں“چ Lokasi tidak didukung";
                return;
            }
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                try {
                    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,is_day`);
                    const weatherData = await weatherRes.json();
                    const lokasiRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=id`);
                    const lokasiData = await lokasiRes.json();
                    const kota = lokasiData.address.city || lokasiData.address.town || lokasiData.address.village || "Lokasi";
                    const suhu = Math.round(weatherData.current.temperature_2m);
                    const kelembapan = weatherData.current.relative_humidity_2m;
                    const kode = weatherData.current.weather_code;
                    const isDay = weatherData.current.is_day;
                    let icon = isDay ? "âک€ï¸ڈ" : "ًںŒ™";
                    let kondisi = "Cerah";
                    if ([1, 2, 3].includes(kode)) kondisi = "Berawan";
                    if ([45, 48].includes(kode)) kondisi = "Berkabut";
                    if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(kode)) kondisi = "Hujan";
                    if ([71, 73, 75, 77, 85, 86].includes(kode)) kondisi = "Salju";
                    if (kondisi === "Hujan") icon = "ًںŒ§ï¸ڈ";
                    else if (kondisi === "Berawan") icon = "âکپï¸ڈ";
                    else if (kondisi === "Berkabut") icon = "ًںŒ«ï¸ڈ";
                    else if (kondisi === "Salju") icon = "â‌„ï¸ڈ";
                    else if (isDay) icon = "âک€ï¸ڈ";
                    else icon = "ًںŒ™";

                    document.getElementById("weatherWidget").innerHTML = `
                        <div class="grid-bg"></div>
                        <div class="city">ًں“چ ${kota}</div>
                        <div class="weather-main">
                            <div class="weather-icon">${icon}</div>
                            <div class="temp">${suhu}آ°C</div>
                        </div>
                        <div class="condition">${kondisi}</div>
                        <div class="info-strip">
                            <div class="info-item"><div class="info-label">HUMIDITY</div><div class="info-value">${kelembapan}%</div></div>
                            <div class="info-item"><div class="info-label">FEELS LIKE</div><div class="info-value">${suhu}آ°C</div></div>
                            <div class="info-item"><div class="info-label">WIND</div><div class="info-value">${Math.floor(Math.random() * 20 + 2)} km/h</div></div>
                        </div>
                    `;
                } catch (err) {
                    document.getElementById("weatherWidget").innerHTML = `<div class="grid-bg"></div><div class="city">âڑ ï¸ڈ Gagal memuat</div><div class="weather-main"><div class="weather-icon">ًںŒگ</div><div class="temp">--آ°C</div></div><div class="condition">Coba lagi nanti</div>`;
                }
            });
        }
        tampilkanCuaca();

        // Inisialisasi matriks awal
        buatMatriks();
    </script>
