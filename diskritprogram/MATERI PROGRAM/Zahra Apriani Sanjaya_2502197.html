    <title>Konversi Biner ke Desimal</title>

<body>

    <h1>Sistem Konversi Bilangan Biner ke Desimal</h1>

    <h2>Kasus 1</h2>
    <p>Input Biner: 1010</p>
    <p>Hasil Desimal: <script>document.write(parseInt("1010", 2));</script></p>

    <p>Hasil Desimal: <script>document.write(parseInt("1101", 2));</script></p>

    <p>Hasil Desimal: <script>document.write(parseInt("10011", 2));</script></p>

    <h2>Kasus 4</h2>

    <p>Hasil Desimal: <script>document.write(parseInt("11111", 2));</script></p>

    <h2>Kasus 5</h2>
    <p>Input Biner: 101101</p>
    <p>Hasil Desimal: <script>document.write(parseInt("101101", 2));</script></p>

</body>
</html>
